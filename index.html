<!DOCTYPE html>
<html>
<head>
<title>Sistem Pelacakan Alumni</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Sistem Pelacakan Alumni</h1>

<div class="form">
<input id="nama" placeholder="Nama Alumni">
<input id="prodi" placeholder="Program Studi">
<input id="tahun" placeholder="Tahun Lulus">

<button onclick="tambahAlumni()">Tambah Alumni</button>
</div>

<h2>Daftar Alumni</h2>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Prodi</th>
<th>Tahun</th>
</tr>
</thead>

<tbody id="dataAlumni"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
